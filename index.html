<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>見開きビューア</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div>EASY viewer</div>
  <input type="file" id="fileInput" multiple accept="image/*">
</div>

<div class="viewer" id="viewer"></div>

<div class="bottom" id="uiBar">
  <div class="btn" onclick="toggleTheme()">theme</div>
  <div class="btn" onclick="toggleBinding()" id="bindingBtn">右綴じ</div>
  <div class="btn" onclick="toggleSortMode()" id="sortBtn">並び替え</div>
  <div class="btn" onclick="toggleUI()">UI</div>
  
</div>

<script src="script.js"></script>
</body>
</html>
