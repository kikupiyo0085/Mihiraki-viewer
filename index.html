<!DOCTYPE html>
<html>
<head>
                <style>:root {
  --bg-main: #363838d5;
  --bg-sub: rgba(57, 65, 65, 0.795);
  --text: #fff;
  --viewer-bg: #dddddd;
  --accent: #ff86b4;
}

body.light {
  --bg-main: #c0c3c5;
  --bg-sub: rgba(174, 180, 179, 0.87);
  --text: #ffffff;
  --viewer-bg: #f0f0f0;
}

body {
  margin: 0;
  background: var(--bg-main);
  color: var(--text);
  font-family: sans-serif;
  overflow: hidden;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 12px;
  background: var(--bg-sub);
  backdrop-filter: blur(12px);
  z-index: 10;
  transition: 0.3s;
}

.viewer {
  position: absolute;
  top: 48px;
  bottom: 80px;
  width: 100%;
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  background: var(--viewer-bg);
}

/* ←ここ重要：右綴じ時 */
.viewer.rtl {
  direction: rtl;
}

.spread {
  min-width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 2px;
  scroll-snap-align: center;
  transition: 0.3s;
}

.spread {
  transition: transform 0.25s ease;
}

.spread.active {
  transform: scale(1.01);
}
/* 非アクティブの暗さを削除 */
.spread:not(.active) {
  transform: scale(0.99);
  filter: none;
}
.spread:has(.page:only-child) {
  justify-content: center;
}

.spread:has(.page:only-child) .page {
  width: 45%;
}

.page {
  width: 40%;
  aspect-ratio: 3/4;
  background: white;
  border-radius: 6px;
  overflow: hidden;
}

.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.gutter {
  display: none;
}

.bottom {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 10px 16px;
  border-radius: 30px;
  background: var(--bg-sub);
  backdrop-filter: blur(10px);
}

:root {
  --accent: #00ada9;
}

/* ボタン */
.btn {
  padding: 6px 12px;
  border-radius: 20px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

/* アクティブ・ホバー */
.btn:hover {
  background: var(--accent);
  color: white;
}

.btn.active {
  background: var(--accent);
  color: white;
}
.hiddenUI {
  opacity: 0;
  pointer-events: none;
}

/* ページ番号 */
.pageNumber {
  position: absolute;
  bottom: 6px;
  right: 10px;
  font-size: 12px;
  color: rgba(0,0,0,0.6);
  background: rgba(255,255,255,0.6);
  padding: 2px 6px;
  border-radius: 6px;
  pointer-events: none;
}

/* 見開き中央表示（おすすめ） */
.spreadNumber {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  background: rgba(0,0,0,0.4);
  padding: 3px 10px;
  border-radius: 10px;
  pointer-events: none;
}

/* スマホ */
@media (max-width: 768px) {

  /* ページを大きく */
  .page {
    width: 46%;
  }

  /* 下UI */
  .bottom {
    bottom: 8px;
    padding: 8px 12px;
    gap: 6px;
  }

  /* ボタン小さく */
  .btn {
    font-size: 12px;
    padding: 5px 10px;
  }

  /* ヘッダー */
  .header {
    height: 44px;
    font-size: 14px;
  }

  .viewer {
    top: 44px;
    bottom: 70px;
  }
}

/* セーフエリア対応（iPhone） */
.bottom {
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}

.header {
  padding-top: env(safe-area-inset-top);
}

.btn {
  -webkit-tap-highlight-color: transparent;
}
.btn:hover {
  background: linear-gradient(135deg, #00ada9, #00cfcf);
}
</style>
            </head>
            <body>
                


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>見開きビューア</title>
  <link rel="stylesheet" href="style.css">



<div class="header">
  <div>EASY viewer</div>
  <input type="file" id="fileInput" multiple="" accept="image/*">
</div>

<div class="viewer" id="viewer"></div>

<div class="bottom" id="uiBar">
  <div class="btn" onclick="toggleTheme()">theme</div>
  <div class="btn" onclick="toggleBinding()">toji</div>
  <div class="btn" onclick="toggleUI()">UI</div>
</div>

<script src="script.js"></script>


                <script>const viewer = document.getElementById('viewer');
const fileInput = document.getElementById('fileInput');

let uiVisible = true;
let isRTL = false;

/* 自然順ソート（重要） */
function naturalSort(a, b) {
  return a.name.localeCompare(b.name, undefined, {
    numeric: true,
    sensitivity: 'base'
  });
}

/* 読み込み */
fileInput.addEventListener('change', (e) => {
  let files = Array.from(e.target.files);
  files.sort(naturalSort);

  viewer.innerHTML = '';

  let pageNum = 1;
  let index = 0;

  // 表紙
  if (files.length > 0) {
    const spread = document.createElement('div');
    spread.className = 'spread';

    const page = createPage(files[0]);
    spread.appendChild(page);

    // ページ番号
    addSpreadNumber(spread, `${pageNum}`);

    viewer.appendChild(spread);

    pageNum++;
    index = 1;
  }

  // 見開き
  for (let i = index; i < files.length; i += 2) {
    const spread = document.createElement('div');
    spread.className = 'spread';

    const page1 = createPage(files[i]);
    spread.appendChild(page1);

    const gutter = document.createElement('div');
    gutter.className = 'gutter';
    spread.appendChild(gutter);

    if (files[i + 1]) {
      const page2 = createPage(files[i + 1]);
      spread.appendChild(page2);

      addSpreadNumber(spread, `${pageNum}-${pageNum + 1}`);
      pageNum += 2;
    } else {
      addSpreadNumber(spread, `${pageNum}`);
      pageNum++;
    }

    viewer.appendChild(spread);
  }

  updateCenter();
});

/* ページ生成 */
function createPage(file) {
  const page = document.createElement('div');
  page.className = 'page';

  const img = document.createElement('img');
  img.src = URL.createObjectURL(file);

  page.appendChild(img);
  return page;
}

/* 中央強調 */
function updateCenter() {
  const spreads = document.querySelectorAll('.spread');
  spreads.forEach(s => s.classList.remove('active'));

  let closest = null;
  let min = Infinity;

  spreads.forEach(s => {
    const rect = s.getBoundingClientRect();
    const center = rect.left + rect.width / 2;
    const dist = Math.abs(window.innerWidth / 2 - center);

    if (dist < min) {
      min = dist;
      closest = s;
    }
  });

  if (closest) closest.classList.add('active');
}

viewer.addEventListener('scroll', () => {
  requestAnimationFrame(updateCenter);
});

/* テーマ */
function toggleTheme() {
  document.body.classList.toggle('light');
}

/* UI */
function toggleUI() {
  uiVisible = !uiVisible;
  document.querySelector('.header').classList.toggle('hiddenUI');
  document.getElementById('uiBar').classList.toggle('hiddenUI');
}

/* 綴じ方向 */
function toggleBinding() {
  isRTL = !isRTL;
  viewer.classList.toggle('rtl');

  // スクロール位置を逆に補正
  viewer.scrollLeft = viewer.scrollWidth;
}

/* タップでUI */
viewer.addEventListener('click', () => {
  toggleUI();
});

function addSpreadNumber(spread, text) {
  const num = document.createElement('div');
  num.className = 'spreadNumber';
  num.textContent = text;
  spread.appendChild(num);
}
num.style.opacity = '0.3';

let scale = 1;
let startDist = 0;
let currentSpread = null;

function getDistance(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

viewer.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    currentSpread = e.target.closest('.spread');
    if (!currentSpread) return;

    startDist = getDistance(e.touches);
  }
}, { passive: false });

viewer.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && currentSpread) {
    e.preventDefault();

    const newDist = getDistance(e.touches);
    let newScale = scale * (newDist / startDist);

    // 制限
    newScale = Math.max(1, Math.min(newScale, 3));

    currentSpread.style.transform = `scale(${newScale})`;

    // スクロール止める
    viewer.style.overflowX = 'hidden';
  }
}, { passive: false });

viewer.addEventListener('touchend', () => {
  scale = Math.max(1, scale);
  startDist = 0;

  // 戻す
  viewer.style.overflowX = 'auto';
});

</script>
            
        
    </body>
